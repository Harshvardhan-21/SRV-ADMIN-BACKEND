services:
  postgres:
    image: postgres:16-alpine
    container_name: srv-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "4268"
      POSTGRES_DB: srv_admin
    ports:
      - "5433:5432"
    volumes:
      - srv_admin_pgdata:/var/lib/postgresql/data
      - ./admin_database.sql:/docker-entrypoint-initdb.d/01-admin_database.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d srv_admin"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  srv_admin_pgdata:
